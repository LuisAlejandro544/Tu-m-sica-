name: CI Check

on:
  push:
    branches: [ "main", "master" ]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [ "main", "master" ]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

jobs:
  ci-verification:
    name: Run CI Verification & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Cache Gradle packages and wrapper
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: |
          if [ -f gradlew ]; then
            chmod +x gradlew
            echo "gradlew permissions updated successfully."
          else
            echo "No gradlew file found, fallback to system gradle."
          fi

      - name: Generate Debug Keystore if missing
        run: |
          if [ ! -f debug.keystore ]; then
            if [ -f debug.keystore.base64 ]; then
              base64 -d debug.keystore.base64 > debug.keystore
              echo "Restored debug.keystore from base64."
            else
              echo "Generating fresh debug.keystore on the fly using keytool..."
              keytool -genkeypair -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug, O=Android, C=US"
              echo "debug.keystore generated successfully."
            fi
          fi

      - name: Run Code Verification & Unit Tests
        run: |
          if [ -f gradlew ]; then
            ./gradlew compileDebugSources testDebugUnitTest --stacktrace
          else
            gradle compileDebugSources testDebugUnitTest --stacktrace
          fi
